# Auto-deploy Supabase Edge Functions on push to main.
# Triggers only when files under supabase/functions/** change so unrelated
# pushes don't burn CI minutes or cause needless redeploys.
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   SUPABASE_ACCESS_TOKEN  - personal access token from
#                            https://supabase.com/dashboard/account/tokens
#   SUPABASE_PROJECT_ID    - your project ref (the part after /project/ in
#                            the dashboard URL, e.g. "abcdefghijklmnop")
#
# Reference: https://supabase.com/docs/guides/functions/cicd-workflow

name: Deploy Supabase Edge Functions

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/**'
      - '.github/workflows/supabase-functions-deploy.yml'
  workflow_dispatch: {}

jobs:
  deploy:
    name: Deploy edge functions
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Verify required secrets
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN secret is missing. Add it in repo Settings -> Secrets and variables -> Actions."
            exit 1
          fi
          if [ -z "$SUPABASE_PROJECT_ID" ]; then
            echo "::error::SUPABASE_PROJECT_ID secret is missing. Add it in repo Settings -> Secrets and variables -> Actions."
            exit 1
          fi

      - name: Deploy funnel-swap-v1-functions
        run: |
          supabase functions deploy funnel-swap-v1-functions \
            --project-ref "$SUPABASE_PROJECT_ID" \
            --no-verify-jwt

      - name: Deploy other edge functions (best effort)
        run: |
          set -e
          for fn_dir in supabase/functions/*/; do
            fn_name=$(basename "$fn_dir")
            if [ "$fn_name" = "funnel-swap-v1-functions" ]; then
              continue
            fi
            if [ "$fn_name" = "_shared" ]; then
              continue
            fi
            echo "Deploying $fn_name..."
            supabase functions deploy "$fn_name" \
              --project-ref "$SUPABASE_PROJECT_ID" \
              --no-verify-jwt || echo "::warning::Deploy of $fn_name failed (continuing)"
          done
