[build]
  command = "npm run build"
  # Forziamo .next perché esiste un override "fantasma" salvato lato UI Netlify
  # (publishOrigin: ui che punta a /opt/build/repo) che il pannello non mostra.
  # Con publish qui in netlify.toml, il toml batte la UI.
  publish = ".next"

[build.environment]
  NEXT_TELEMETRY_DISABLED = "1"
  NODE_VERSION = "20"
  NODE_OPTIONS = "--max-old-space-size=6144"

[[plugins]]
  package = "@netlify/plugin-nextjs"
